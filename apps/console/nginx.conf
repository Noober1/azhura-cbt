# Admin/supervisor console — static SPA server.
#
# Scope: static files + SPA history fallback ONLY. This server does NOT proxy
# the backend API; the console reaches the backend directly on the LAN (:3000).
# Keep it dumb on purpose: fewer moving parts, smaller attack surface.

server {
    listen      80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Don't advertise the nginx version in responses / error pages.
    server_tokens off;

    # --- gzip: compress text assets on the fly ---
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- security headers (static-server appropriate) ---
    # CSP is intentionally NOT set here — the backend owns the app's CSP (#191)
    # and the console is configured to call it cross-origin. Adding a second,
    # conflicting policy here would be a footgun. These three are safe, static
    # hardening headers for any served response.
    add_header X-Content-Type-Options nosniff               always;
    add_header X-Frame-Options        DENY                  always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # --- hashed build assets: cache hard, they are content-addressed ---
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        # Re-assert security headers (add_header does not inherit into a nested
        # location block that defines its own add_header).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        try_files $uri =404;
    }

    # --- SPA history fallback: unknown routes resolve to index.html ---
    # The console uses react-router BrowserRouter, so deep links like
    # /exams/123 must be served index.html and routed client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, so a new deploy is picked up immediately.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }
}
