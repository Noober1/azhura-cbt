# Azhura CBT — Student app release pipeline (issue #175)
#
# Builds the Tauri 2 student client (apps/student) and publishes a DRAFT GitHub
# Release with the OS installers attached as assets. The installers are the
# artifacts that issue #49's LAN self-update proxy will later consume.
#
# ── Tag convention ──────────────────────────────────────────────────────────
#   Releases are cut from an annotated git tag of the form:  student-vX.Y.Z
#   (e.g. student-v0.1.0, student-v1.2.3). The tag's X.Y.Z MUST match the
#   `version` field in BOTH:
#     - apps/student/src-tauri/tauri.conf.json
#     - apps/student/src-tauri/Cargo.toml
#   Tauri stamps the installer/file names from tauri.conf.json's version, so a
#   mismatched tag produces a Release whose assets disagree with the tag name.
#   See docs/RELEASE_STUDENT.md for the full cut-a-release checklist.
#
#   `student-v*` is deliberately namespaced so this pipeline never collides with
#   any future backend/console release tags.
#
# ── What runs ───────────────────────────────────────────────────────────────
#   Windows is the REQUIRED target (exam workstations are Windows): produces
#   the WiX `.msi` + NSIS `.exe` (tauri.conf.json bundle.targets = "all").
#   Linux is best-effort / internal (AppImage + .deb) for QA convenience; if it
#   ever flakes it must not block the Windows release (fail-fast disabled).
#
# Build is delegated to the battle-tested tauri-apps/tauri-action — do NOT
# hand-roll the cargo/bundler invocation.

name: Student Release

on:
  push:
    tags:
      - "student-v*"
  # Manual trigger for dry-runs / re-builds. When dispatched without a matching
  # tag, tauri-action still drafts a Release named from the chosen ref.
  workflow_dispatch:

# Don't run two releases for the same tag/ref concurrently.
concurrency:
  group: student-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & draft release (${{ matrix.platform }})
    # Scope the Release-creation write to this job only, so any future jobs
    # added to this workflow don't inherit `contents: write`.
    permissions:
      contents: write
    # Hoist the signing secret to JOB-LEVEL env. Job-level env IS reliably
    # available inside step-level `if:` expressions across runner versions
    # (step-level env is not), so the signing steps' guards read it here.
    env:
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
    strategy:
      # Windows is the required deliverable; a Linux hiccup must not cancel it.
      fail-fast: false
      matrix:
        include:
          # REQUIRED — exam workstation target. Builds .msi (WiX) + .exe (NSIS).
          # --verbose temporarily surfaces signtool's real error on signing failures.
          - platform: windows-latest
            args: "--verbose"
          # OPTIONAL / internal QA — AppImage + .deb. Best-effort.
          - platform: ubuntu-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # Fail fast if the pushed tag's version disagrees with tauri.conf.json.
      # Tauri stamps installer file names from tauri.conf.json's version, so a
      # mismatch would yield a Release whose assets contradict the tag name.
      # Tag-only: workflow_dispatch dry-runs have no student-v* ref to check.
      - name: Verify tag matches tauri.conf.json version
        if: startsWith(github.ref, 'refs/tags/student-v')
        shell: bash
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#student-v}"
          CONF_VERSION=$(jq -r '.version' apps/student/src-tauri/tauri.conf.json)
          if [ "$TAG_VERSION" != "$CONF_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) != tauri.conf.json version ($CONF_VERSION)"; exit 1
          fi

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      # Cache the Rust build for the Tauri shell only. Keyed per-OS by the
      # cache action so the Windows and Linux toolchains never clobber.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/student/src-tauri -> target"

      # Tauri's Linux bundler needs the WebKitGTK / appindicator / rsvg stack.
      # Windows + macOS runners ship everything Tauri needs out of the box.
      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # ── Code signing (Windows) — Diaktifkan oleh #28 (code signing) ──────────
      # GUARDED activation: this step (and the two below) only run on the Windows
      # runner AND only when the signing secret is present. With no secrets set,
      # the `env.WINDOWS_CERT_PFX_BASE64 != ''` guard short-circuits every signing
      # step, so the build stays UNSIGNED and the pipeline still goes green for
      # ordinary dev/QA builds. Self-signed cert workflow: see docs/CODE_SIGNING.md.
      #
      # Step 1 — materialize the PFX from the base64 secret and resolve its
      # Authenticode thumbprint. The thumbprint is exported to $GITHUB_ENV so the
      # next step can inject it into tauri.conf.json. The job-level
      # WINDOWS_CERT_PFX_BASE64 env (read in the step body and the `if:` guard)
      # is the single source of the secret. We import the PFX into the
      # CurrentUser cert store so signtool (invoked by Tauri) can find the private
      # key by thumbprint at bundle time.
      - name: Import code-signing certificate
        if: runner.os == 'Windows' && env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          # Fail the step on any error (e.g. a bad Import-PfxCertificate) instead
          # of silently continuing with an unset thumbprint.
          $ErrorActionPreference = 'Stop'
          # Mask the password in logs (defence-in-depth on top of Actions' own
          # secret redaction). Never Write-Host the password or thumbprint plainly.
          Write-Host "::add-mask::$env:WINDOWS_CERT_PASSWORD"
          $pfxBytes = [System.Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64)
          $pfxPath  = Join-Path $env:RUNNER_TEMP "azhura-signing.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          echo "WINDOWS_CERT_PATH=$pfxPath" >> $env:GITHUB_ENV

          $securePwd = ConvertTo-SecureString $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate `
            -FilePath $pfxPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $securePwd
          # The thumbprint is not secret, but mask it anyway so it never helps
          # correlate logs, then hand it to the next step via $GITHUB_ENV.
          Write-Host "::add-mask::$($cert.Thumbprint)"
          echo "WINDOWS_CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
          Write-Host "Code-signing certificate imported (thumbprint masked)."

      # Step 2 — inject the resolved thumbprint into tauri.conf.json so Tauri's
      # bundler signs the .msi/.exe. tauri.conf.json ships with a null
      # certificateThumbprint (unsigned default); we only overwrite it when
      # signing is active. timestampUrl is already set in the config and is left
      # untouched. Done with ConvertFrom-Json/ConvertTo-Json — no extra tooling.
      - name: Enable signing in tauri.conf.json
        if: runner.os == 'Windows' && env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $confPath = "apps/student/src-tauri/tauri.conf.json"
          $conf = Get-Content $confPath -Raw | ConvertFrom-Json
          $conf.bundle.windows.certificateThumbprint = $env:WINDOWS_CERT_THUMBPRINT
          $conf | ConvertTo-Json -Depth 32 | Set-Content $confPath -Encoding utf8
          Write-Host "Injected signing thumbprint into $confPath."

      # Tag-only: a workflow_dispatch run executes the build/setup steps above as
      # a smoke-test but skips this step, so it never drafts a junk Release named
      # after a branch. Real Releases are cut solely from student-v* tags.
      - name: Build & draft release
        if: startsWith(github.ref, 'refs/tags/student-v')
        # Pinned to the current resolution of v0. SHA-pinning
        # (tauri-apps/tauri-action@<commit-sha>) is the stronger supply-chain
        # guard; prefer it if you want fully immutable third-party actions.
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          # tauri-action uses this to create the Release + upload assets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          #
          # ── Updater signing placeholder — Diaktifkan oleh #49 (self-update) ──
          # The self-update epic adds the tauri-plugin-updater. Once it does,
          # uncomment these so tauri-action signs the bundles and emits the
          # `latest.json` the LAN update proxy serves. Inactive today: without
          # the updater plugin configured, signing is a no-op and these unset
          # vars do not affect the build.
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          #
          # ── Windows code-signing — Diaktifkan oleh #28 (code signing) ──────
          # Signing is driven entirely by the bundle.windows.certificateThumbprint
          # injected into tauri.conf.json by the "Enable signing in
          # tauri.conf.json" step above. Tauri's bundler invokes signtool, which
          # finds the imported private key by thumbprint in the CurrentUser store
          # — so no extra env vars are needed here. When no signing secret is set,
          # certificateThumbprint stays null and the bundles ship unsigned.
        with:
          # Build the student app specifically (monorepo has multiple packages).
          projectPath: apps/student
          # Use the pushed tag verbatim (student-vX.Y.Z) as the Release tag.
          tagName: ${{ github.ref_name }}
          releaseName: "Azhura Student ${{ github.ref_name }}"
          releaseBody: |
            Automated build of the Azhura CBT student client.
            Installers for each OS are attached below.

            Review, then publish this draft when ready.
          # Draft so a human verifies installers before the release goes live.
          releaseDraft: true
          prerelease: false
          # Per-OS bundle selection. Empty for both today — tauri.conf.json's
          # bundle.targets = "all" yields .msi + .exe on Windows and
          # AppImage + .deb on Linux. Kept in the matrix so #28/#49 can later
          # pass e.g. "--bundles msi,nsis" without touching this step.
          args: ${{ matrix.args }}

      # ── Code-signing cleanup (Windows) — Diaktifkan oleh #28 ─────────────────
      # Always delete the materialized PFX so the private key never lingers on
      # the runner, even if the build failed. `if: always()` plus the secret
      # guard; the Remove-Item is a no-op when no PFX was ever written.
      - name: Clean up code-signing certificate
        if: always() && runner.os == 'Windows' && env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:WINDOWS_CERT_PATH) {
            Remove-Item -Force $env:WINDOWS_CERT_PATH -ErrorAction SilentlyContinue
          }
          # Also drop the imported cert from the CurrentUser store by thumbprint.
          if ($env:WINDOWS_CERT_THUMBPRINT) {
            Remove-Item -Force "Cert:\CurrentUser\My\$env:WINDOWS_CERT_THUMBPRINT" -ErrorAction SilentlyContinue
          }
          Write-Host "Signing material cleaned up."
